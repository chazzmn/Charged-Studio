<svg width="1680" height="1200" viewBox="0 0 1680 1200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECE9E2"/><stop offset="1" stop-color="#E2DED5"/></linearGradient>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9FBFD0"/><stop offset="0.55" stop-color="#CBD7CE"/><stop offset="1" stop-color="#E9E1CF"/></linearGradient>
  <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5C879B"/><stop offset="1" stop-color="#3E6678"/></linearGradient>
  <linearGradient id="ovl" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1F3D2F" stop-opacity="0.55"/><stop offset="0.6" stop-color="#1F3D2F" stop-opacity="0"/></linearGradient>
  <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#86A8B8"/><stop offset="1" stop-color="#4E7488"/></linearGradient>
  <linearGradient id="p2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#C8B89A"/><stop offset="1" stop-color="#9A7E55"/></linearGradient>
  <linearGradient id="p3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8FA890"/><stop offset="1" stop-color="#5C7A5F"/></linearGradient>
  <filter id="winShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#3a2f23" flood-opacity="0.28"/></filter>
  <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1f3d2f" flood-opacity="0.22"/></filter>
  <clipPath id="win"><rect x="40" y="44" width="1600" height="1112" rx="18"/></clipPath>
  <clipPath id="heroClip"><rect x="40" y="98" width="1600" height="566"/></clipPath>
  <clipPath id="c1"><rect x="92" y="800" width="490" height="180" rx="16"/></clipPath>
  <clipPath id="c2"><rect x="606" y="800" width="490" height="180" rx="16"/></clipPath>
  <clipPath id="c3"><rect x="1120" y="800" width="490" height="180" rx="16"/></clipPath>
</defs>
<rect width="1680" height="1200" fill="url(#bg)"/>
<rect x="40" y="44" width="1600" height="1112" rx="18" fill="#F4F1E9" filter="url(#winShadow)"/>
<g clip-path="url(#win)">
  <rect x="40" y="44" width="1600" height="54" fill="#ECE6D8"/>
  <circle cx="74" cy="71" r="7" fill="#E2685C"/><circle cx="98" cy="71" r="7" fill="#E9B14C"/><circle cx="122" cy="71" r="7" fill="#5FB85C"/>
  <rect x="300" y="56" width="600" height="30" rx="15" fill="#F4F1E9" stroke="#d8d0bd"/>
  <text x="605" y="76" font-family="Manrope400" font-size="14" fill="#8a8266">coastandcounty.co.uk</text>

  <!-- HERO coastal scene -->
  <g clip-path="url(#heroClip)">
    <rect x="40" y="98" width="1600" height="566" fill="url(#sky)"/>
    <circle cx="1280" cy="240" r="90" fill="#F4ECD8" opacity="0.7"/>
    <!-- distant headland -->
    <path d="M40 470 C300 410 520 440 760 470 C980 498 1200 470 1640 440 L1640 664 L40 664 Z" fill="#7C9A86" opacity="0.7"/>
    <!-- sea -->
    <rect x="40" y="520" width="1600" height="144" fill="url(#sea)"/>
    <g stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2" fill="none"><path d="M120 560 q30 -8 60 0 t60 0 t60 0"/><path d="M1200 590 q30 -8 60 0 t60 0 t60 0"/></g>
    <!-- cliff + modern house right -->
    <path d="M1180 520 L1640 520 L1640 664 L1180 664 Z" fill="#6E8C76"/>
    <g><rect x="1320" y="430" width="150" height="92" fill="#F4F1E9"/><rect x="1470" y="452" width="90" height="70" fill="#E4DECF"/><path d="M1320 430 L1395 392 L1470 430 Z" fill="#42504A"/><rect x="1346" y="456" width="34" height="40" fill="#3E6678"/><rect x="1396" y="456" width="34" height="40" fill="#3E6678"/><rect x="1488" y="474" width="48" height="40" fill="#3E6678"/></g>
    <rect x="40" y="98" width="1600" height="566" fill="url(#ovl)"/>
    <!-- nav overlaid -->
