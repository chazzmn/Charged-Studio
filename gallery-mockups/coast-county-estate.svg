    <text x="92" y="160" font-family="Manrope600" font-size="9.5" fill="#E8Cf97" letter-spacing="4">ESTATE AGENTS · DEVON</text>
    <text x="1106" y="146" text-anchor="middle" font-family="Manrope600" font-size="14" fill="#FFFFFF">Buy</text>
    <text x="1176" y="146" text-anchor="middle" font-family="Manrope600" font-size="14" fill="#FFFFFF">Sell</text>
    <text x="1244" y="146" text-anchor="middle" font-family="Manrope600" font-size="14" fill="#FFFFFF">Rent</text>
    <text x="1330" y="146" text-anchor="middle" font-family="Manrope600" font-size="14" fill="#FFFFFF">Valuations</text>
    <rect x="1410" y="120" width="178" height="46" rx="23" fill="#B8923E"/><text x="1499" y="148" text-anchor="middle" font-family="Manrope700" font-size="14" fill="#FFFFFF">Book a valuation</text>
    <!-- headline -->
    <text x="90" y="320" font-family="Manrope700" font-size="14" fill="#E8CF97" letter-spacing="3">SALES · LETTINGS · COASTAL PROPERTY</text>
    <text x="88" y="416" font-family="Cormorant700" font-size="74" fill="#FFFFFF">Find your place</text>
    <text x="88" y="488" font-family="Cormorant700" font-size="74" fill="#FFFFFF">on the Devon coast.</text>
  </g>

