  <text x="556" y="640" font-family="Manrope700" font-size="12" fill="#9a8f72" letter-spacing="1">PROPERTY TYPE</text>
  <text x="556" y="668" font-family="Manrope500" font-size="16" fill="#2b2a24">Houses</text>
  <line x1="900" y1="624" x2="900" y2="672" stroke="#e3ddcc"/>
  <text x="936" y="640" font-family="Manrope700" font-size="12" fill="#9a8f72" letter-spacing="1">MAX PRICE</text>
  <text x="936" y="668" font-family="Manrope500" font-size="16" fill="#2b2a24">£750,000</text>
  <rect x="1300" y="620" width="224" height="56" rx="28" fill="#1F3D2F"/><text x="1412" y="655" text-anchor="middle" font-family="Manrope700" font-size="16" fill="#FFFFFF">Search homes</text>

  <!-- listings -->
  <text x="92" y="772" font-family="Cormorant700" font-size="36" fill="#23332b">Featured properties</text>
  <text x="1610" y="770" text-anchor="end" font-family="Manrope600" font-size="15" fill="#B8923E">Browse all listings &#8594;</text>

  <!-- card 1 -->
  <rect x="92" y="800" width="490" height="334" rx="16" fill="#FFFFFF" filter="url(#soft)"/>
  <g clip-path="url(#c1)"><rect x="92" y="800" width="490" height="180" fill="url(#p1)"/><path d="M300 980 L300 900 L360 866 L420 900 L420 980 Z" fill="#FFFFFF" opacity="0.92"/><path d="M300 900 L360 866 L420 900" stroke="#2b3a42" stroke-width="3" fill="none"/></g>
  <rect x="112" y="820" width="120" height="30" rx="15" fill="#1F3D2F"/><text x="172" y="840" text-anchor="middle" font-family="Manrope700" font-size="13" fill="#FFFFFF">FOR SALE</text>
  <text x="116" y="1024" font-family="Manrope800" font-size="26" fill="#23332b">£625,000</text>
  <text x="116" y="1054" font-family="Manrope600" font-size="15" fill="#4a564d">Cliff Road, Exmouth</text>
  <text x="116" y="1084" font-family="Manrope400" font-size="13.5" fill="#7c887f">4 bed · 2 bath · sea views</text>
  <text x="116" y="1114" font-family="Manrope700" font-size="13.5" fill="#B8923E">View details &#8594;</text>

  <!-- card 2 -->
  <rect x="606" y="800" width="490" height="334" rx="16" fill="#FFFFFF" filter="url(#soft)"/>
  <g clip-path="url(#c2)"><rect x="606" y="800" width="490" height="180" fill="url(#p2)"/><path d="M814 980 L814 902 L874 868 L934 902 L934 980 Z" fill="#FFFFFF" opacity="0.92"/><path d="M814 902 L874 868 L934 902" stroke="#5b4a30" stroke-width="3" fill="none"/></g>
  <rect x="626" y="820" width="120" height="30" rx="15" fill="#1F3D2F"/><text x="686" y="840" text-anchor="middle" font-family="Manrope700" font-size="13" fill="#FFFFFF">FOR SALE</text>
  <text x="630" y="1024" font-family="Manrope800" font-size="26" fill="#23332b">£925,000</text>
  <text x="630" y="1054" font-family="Manrope600" font-size="15" fill="#4a564d">The Maltings, Topsham</text>
  <text x="630" y="1084" font-family="Manrope400" font-size="13.5" fill="#7c887f">5 bed · 3 bath · period home</text>
  <text x="630" y="1114" font-family="Manrope700" font-size="13.5" fill="#B8923E">View details &#8594;</text>

  <!-- card 3 -->
  <rect x="1120" y="800" width="490" height="334" rx="16" fill="#FFFFFF" filter="url(#soft)"/>
  <g clip-path="url(#c3)"><rect x="1120" y="800" width="490" height="180" fill="url(#p3)"/><path d="M1328 980 L1328 902 L1388 868 L1448 902 L1448 980 Z" fill="#FFFFFF" opacity="0.92"/><path d="M1328 902 L1388 868 L1448 902" stroke="#3a4a3b" stroke-width="3" fill="none"/></g>
  <rect x="1140" y="820" width="120" height="30" rx="15" fill="#B8923E"/><text x="1200" y="840" text-anchor="middle" font-family="Manrope700" font-size="13" fill="#FFFFFF">NEW</text>
  <text x="1144" y="1024" font-family="Manrope800" font-size="26" fill="#23332b">£480,000</text>
  <text x="1144" y="1054" font-family="Manrope600" font-size="15" fill="#4a564d">Orchard Lane, Budleigh</text>
  <text x="1144" y="1084" font-family="Manrope400" font-size="13.5" fill="#7c887f">3 bed · 2 bath · new build</text>
  <text x="1144" y="1114" font-family="Manrope700" font-size="13.5" fill="#B8923E">View details &#8594;</text>
</g>
</svg>
